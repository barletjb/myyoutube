
@if (isLoggedIn()) {
<div class="p-8 max-w-2xl mx-auto">

  <div class="flex items-center gap-6 mb-8">
    <div class="w-20 h-20 rounded-full bg-blue-600 text-white text-2xl font-semibold flex items-center justify-center flex-shrink-0">
      {{ getInitials() }}
    </div>
    <div>
      <h1 class="text-2xl font-semibold text-zinc-900 dark:text-white">{{ user()?.username }}</h1>
      <p class="text-sm text-zinc-500 dark:text-zinc-400">{{ user()?.email }}</p>
    </div>
  </div>

  <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl divide-y divide-zinc-200 dark:divide-zinc-700">

    <div class="flex items-center gap-4 px-6 py-4">
      <i class="ti ti-user text-xl text-zinc-400 flex-shrink-0"></i>
      <div>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mb-0.5">Nom d'utilisateur</p>
        <p class="text-sm font-medium text-zinc-900 dark:text-white">{{ user()?.username }}</p>
      </div>
    </div>

    <div class="flex items-center gap-4 px-6 py-4">
      <i class="ti ti-mail text-xl text-zinc-400 flex-shrink-0"></i>
      <div>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mb-0.5">Email</p>
        <p class="text-sm font-medium text-zinc-900 dark:text-white">{{ user()?.email }}</p>
      </div>
    </div>

    <div class="flex items-center gap-4 px-6 py-4">
      <i class="ti ti-calendar text-xl text-zinc-400 flex-shrink-0"></i>
      <div>
        <p class="text-xs text-zinc-400 dark:text-zinc-500 mb-0.5">Membre depuis</p>
        <p class="text-sm font-medium text-zinc-900 dark:text-white">{{ user()?.createdAt | date:'longDate' }}</p>
      </div>
    </div>

  </div>

  <div class="flex gap-3 mt-6">
    <button class="flex items-center gap-2 px-4 py-2 rounded-xl border border-zinc-300 dark:border-zinc-600 text-sm font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
      <i class="ti ti-edit text-base"></i>
      Modifier le profil
    </button>
    <button
      (click)="logout()"
      class="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-500 hover:bg-red-600 text-white text-sm font-medium transition-colors">
      <i class="ti ti-logout text-base"></i>
      Déconnexion
    </button>
  </div>

</div>
}
